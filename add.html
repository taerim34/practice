<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>🚨💥 권영훈 책 추가 💥🚨</title>
<link rel="stylesheet" href="style.css" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Pacifico&family=Press+Start+2P&family=Rubik+Glitch&display=swap');

  body.flashy {
    background:
      radial-gradient(circle at 20% 30%, rgba(255,0,110,1), transparent 35%),
      radial-gradient(circle at 80% 60%, rgba(58,134,255,1), transparent 35%),
      radial-gradient(circle at 50% 90%, rgba(6,255,165,1), transparent 35%),
      radial-gradient(circle at 70% 20%, rgba(255,190,11,1), transparent 35%),
      radial-gradient(circle at 30% 70%, rgba(131,56,236,1), transparent 35%),
      conic-gradient(from 0deg at 50% 50%, #ff006e, #ffbe0b, #06ffa5, #3a86ff, #8338ec, #ff006e);
    background-size: 100% 100%, 100% 100%, 100% 100%, 100% 100%, 100% 100%, 200% 200%;
    animation: bgShift 4s ease infinite, bgSpin 8s linear infinite;
    overflow-x: hidden;
    min-height: 100vh;
  }
  @keyframes bgSpin {
    0% { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(360deg); }
  }
  body.flashy::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent 0, transparent 40px, rgba(255,255,255,0.05) 40px, rgba(255,255,255,0.05) 42px),
      repeating-linear-gradient(90deg, transparent 0, transparent 40px, rgba(255,255,255,0.05) 40px, rgba(255,255,255,0.05) 42px);
    pointer-events: none;
    z-index: 0;
    animation: gridMove 3s linear infinite;
  }
  @keyframes gridMove {
    0% { transform: translate(0, 0); }
    100% { transform: translate(42px, 42px); }
  }
  body.flashy::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 50% 50%, transparent 30%, rgba(0,0,0,0.3) 100%);
    pointer-events: none;
    z-index: 1;
    animation: vignette 2s ease-in-out infinite alternate;
  }
  @keyframes vignette {
    0% { opacity: 0.3; }
    100% { opacity: 0.8; }
  }
  @keyframes bgShift {
    0%,100% { background-position: 0 0, 100% 100%, 50% 50%, 0% 50%; }
    50% { background-position: 100% 100%, 0 0, 30% 70%, 100% 50%; }
  }

  body.flashy nav {
    background: linear-gradient(90deg, #ff006e, #ffbe0b, #06ffa5, #3a86ff, #8338ec, #ff006e);
    background-size: 500% 500%;
    animation: navshift 4s linear infinite;
    border-bottom: 5px groove #fff;
    box-shadow: 0 0 40px #ffff00, 0 0 80px #ff00ff;
  }
  @keyframes navshift {
    0% { background-position: 0% 50%; }
    100% { background-position: 500% 50%; }
  }
  body.flashy nav a, body.flashy nav .brand {
    color: #fff !important;
    text-shadow: 2px 2px 0 #000, 0 0 15px #ffff00;
    font-family: 'Bungee Shade', cursive;
    font-size: 1.3rem;
  }
  body.flashy nav a.active { animation: activeFlash 0.6s infinite alternate; }
  @keyframes activeFlash {
    0% { color: #ffff00 !important; transform: scale(1); }
    100% { color: #00ffff !important; transform: scale(1.2); }
  }

  main { position: relative; z-index: 2; padding-bottom: 4rem; }

  .add-title {
    font-family: 'Rubik Glitch', cursive;
    font-size: clamp(3rem, 10vw, 7rem);
    text-align: center;
    background: linear-gradient(90deg, #ff006e, #ffbe0b, #06ffa5, #00ffff, #8338ec, #ff006e);
    background-size: 600% 600%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(4px 4px 0 #000) drop-shadow(-4px -4px 0 #fff) drop-shadow(0 0 40px #ff00ff);
    margin: 2rem 0;
    animation: titleJump 0.6s ease-in-out infinite, titleRainbow 3s linear infinite, titleGlitch 0.15s infinite;
    letter-spacing: 6px;
  }
  @keyframes titleJump {
    0%,100% { transform: translateY(0) rotate(-3deg) scale(1); }
    50% { transform: translateY(-25px) rotate(3deg) scale(1.05); }
  }
  @keyframes titleRainbow {
    0% { background-position: 0% 50%; }
    100% { background-position: 600% 50%; }
  }
  @keyframes titleGlitch {
    0%,100% { transform: translate(0) translateY(0) rotate(-3deg); }
    20% { transform: translate(-3px, 2px) rotate(-3deg); }
    40% { transform: translate(3px, -2px) rotate(-3deg); }
    60% { transform: translate(-2px, 3px) rotate(-3deg); }
    80% { transform: translate(2px, -3px) rotate(-3deg); }
  }
  .add-title-shadow {
    position: relative;
    display: block;
  }
  .add-title-shadow::before,
  .add-title-shadow::after {
    content: '💥 책 추가 💥';
    position: absolute;
    inset: 0;
    color: transparent;
    -webkit-text-stroke: 2px #fff;
    pointer-events: none;
  }
  .add-title-shadow::before { animation: ghostL 2s ease-in-out infinite; }
  .add-title-shadow::after { animation: ghostR 2s ease-in-out infinite; }
  @keyframes ghostL {
    0%,100% { transform: translate(0); opacity: 0.5; -webkit-text-stroke-color: #ff006e; }
    50% { transform: translate(-15px, 5px); opacity: 0.8; -webkit-text-stroke-color: #00ffff; }
  }
  @keyframes ghostR {
    0%,100% { transform: translate(0); opacity: 0.5; -webkit-text-stroke-color: #00ffff; }
    50% { transform: translate(15px, -5px); opacity: 0.8; -webkit-text-stroke-color: #ffff00; }
  }

  .add-wrap {
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    border: 6px double #ffff00;
    border-radius: 30px;
    padding: 2rem !important;
    box-shadow:
      0 0 40px #ff00ff,
      0 0 80px #00ffff,
      inset 0 0 40px rgba(255,0,110,0.3);
    animation: wrapGlow 2s ease-in-out infinite, wrapTilt 5s ease-in-out infinite;
    position: relative;
  }
  @keyframes wrapGlow {
    0% { box-shadow: 0 0 40px #ff00ff, 0 0 80px #00ffff, inset 0 0 40px rgba(255,0,110,0.3); border-color: #ffff00; }
    33% { box-shadow: 0 0 60px #ffff00, 0 0 120px #ff006e, inset 0 0 60px rgba(0,255,255,0.4); border-color: #ff006e; }
    66% { box-shadow: 0 0 60px #06ffa5, 0 0 120px #8338ec, inset 0 0 60px rgba(255,255,0,0.4); border-color: #00ffff; }
    100% { box-shadow: 0 0 40px #ff00ff, 0 0 80px #00ffff, inset 0 0 40px rgba(255,0,110,0.3); border-color: #ffff00; }
  }
  @keyframes wrapTilt {
    0%,100% { transform: perspective(1000px) rotateX(0) rotateY(0); }
    25% { transform: perspective(1000px) rotateX(2deg) rotateY(-2deg); }
    75% { transform: perspective(1000px) rotateX(-2deg) rotateY(2deg); }
  }
  .add-wrap::before {
    content: '';
    position: absolute;
    inset: -10px;
    background: conic-gradient(from 0deg, #ff006e, #ffbe0b, #06ffa5, #00ffff, #8338ec, #ff006e);
    border-radius: 35px;
    z-index: -1;
    animation: conicSpin 3s linear infinite;
    filter: blur(10px);
  }
  @keyframes conicSpin {
    0% { transform: rotate(0); }
    100% { transform: rotate(360deg); }
  }

  form label {
    font-family: 'Press Start 2P', cursive !important;
    font-size: 0.8rem !important;
    background: linear-gradient(90deg, #ffff00, #ff006e, #00ffff, #ffff00);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(2px 2px 0 #000) drop-shadow(0 0 8px #ff00ff);
    letter-spacing: 2px;
    animation: labelRainbow 3s linear infinite;
  }
  @keyframes labelRainbow {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }
  form input, form select, form textarea {
    background: rgba(255,255,255,0.95) !important;
    border: 3px dashed #ff006e !important;
    border-radius: 12px !important;
    padding: 0.9rem !important;
    font-family: 'Pacifico', cursive !important;
    font-size: 1.1rem !important;
    color: #8338ec !important;
    box-shadow: 0 0 15px rgba(255,255,0,0.5);
    transition: all 0.3s;
  }
  form input:focus, form select:focus, form textarea:focus {
    border-color: #00ffff !important;
    box-shadow: 0 0 25px #00ffff, 0 0 50px #ff00ff !important;
    transform: scale(1.02);
  }
  form input:hover, form select:hover, form textarea:hover {
    animation: wiggle 0.3s;
  }
  @keyframes wiggle {
    0%,100% { transform: rotate(0); }
    25% { transform: rotate(-1deg); }
    75% { transform: rotate(1deg); }
  }

  .btn-row .btn {
    font-family: 'Press Start 2P', cursive !important;
    font-size: 1rem !important;
    padding: 1.2rem 2rem !important;
    border-radius: 40px !important;
    border: 4px solid #fff !important;
    text-shadow: 2px 2px 0 #000;
    box-shadow: 0 0 25px #fff, 0 0 50px currentColor !important;
    background: linear-gradient(45deg, #06ffa5, #3a86ff, #ff006e, #ffbe0b) !important;
    background-size: 400% 400% !important;
    animation: btnShift 3s linear infinite, btnPulse 1s ease-in-out infinite !important;
    color: #fff !important;
  }
  @keyframes btnShift {
    0% { background-position: 0% 50%; }
    100% { background-position: 400% 50%; }
  }
  @keyframes btnPulse {
    0%,100% { transform: scale(1) rotate(-2deg); }
    50% { transform: scale(1.08) rotate(2deg); }
  }
  .btn-row .btn:hover {
    transform: scale(1.25) rotate(720deg) !important;
    transition: transform 1s !important;
  }
  .btn-row .btn.danger {
    background: linear-gradient(45deg, #000, #8338ec, #ff006e) !important;
  }

  .preview {
    background: linear-gradient(135deg, #fff, #ffe4e1) !important;
    border: 5px double #00ffff !important;
    border-radius: 25px !important;
    box-shadow: 0 0 40px #ff00ff, 0 0 80px #ffff00 !important;
    animation: previewFloat 3s ease-in-out infinite;
  }
  @keyframes previewFloat {
    0%,100% { transform: rotate(-2deg) translateY(0); }
    50% { transform: rotate(2deg) translateY(-10px); }
  }
  .preview-title {
    font-family: 'Bungee Shade', cursive !important;
    font-size: 1.3rem !important;
    background: linear-gradient(90deg, #ff006e, #8338ec, #3a86ff);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
    letter-spacing: 3px;
  }
  .preview .empty {
    font-family: 'Pacifico', cursive !important;
    font-size: 1.2rem !important;
    color: #ff006e !important;
    animation: emptyWobble 1.5s ease-in-out infinite;
  }
  @keyframes emptyWobble {
    0%,100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }
  .preview .list li {
    background: linear-gradient(135deg, #fff, #e0f7fa) !important;
    border: 3px dashed #ff006e !important;
    animation: cardWiggle 4s ease-in-out infinite;
  }
  @keyframes cardWiggle {
    0%,100% { transform: rotate(-1deg); }
    50% { transform: rotate(1deg); }
  }
  .preview .list strong {
    font-family: 'Bungee Shade', cursive;
    font-size: 1.5rem;
    background: linear-gradient(90deg, #ff006e, #8338ec);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .tag {
    background: linear-gradient(45deg, #ffbe0b, #ff006e) !important;
    color: #fff !important;
    font-family: 'Press Start 2P', cursive !important;
    font-size: 0.6rem !important;
    text-shadow: 1px 1px 0 #000;
    animation: tagPulse 1s ease-in-out infinite;
  }
  @keyframes tagPulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }

  .marquee-add {
    overflow: hidden;
    white-space: nowrap;
    background: #000;
    color: #ff006e;
    padding: 0.8rem 0;
    font-family: 'Press Start 2P', cursive;
    font-size: 1.1rem;
    border-top: 4px solid #ffff00;
    border-bottom: 4px solid #00ffff;
    margin-bottom: 1rem;
  }
  .marquee-add span {
    display: inline-block;
    padding-left: 100%;
    animation: scroll 18s linear infinite;
  }
  @keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
  }

  .confetti {
    position: fixed;
    pointer-events: none;
    font-size: 2.8rem;
    animation: confettiFall 5s linear infinite;
    z-index: 50;
    filter: drop-shadow(0 0 10px #ff00ff);
  }
  @keyframes confettiFall {
    0% { transform: translateY(-10vh) rotate(0) scale(0.5); opacity: 0; }
    10% { opacity: 1; transform: translateY(0) rotate(180deg) scale(1.2); }
    50% { transform: translateY(50vh) rotate(720deg) scale(1); }
    90% { opacity: 1; }
    100% { transform: translateY(110vh) rotate(1800deg) scale(0.3); opacity: 0; }
  }

  .laser {
    position: fixed;
    top: 0; left: 50%;
    width: 4px;
    height: 100vh;
    background: linear-gradient(180deg, transparent, #ff006e, #ffff00, #00ffff, transparent);
    transform-origin: top center;
    animation: laserSweep 3s ease-in-out infinite;
    pointer-events: none;
    z-index: 2;
    box-shadow: 0 0 20px #ff006e, 0 0 40px #ff006e;
  }
  .laser:nth-child(2) { animation-delay: -1s; animation-duration: 4s; }
  .laser:nth-child(3) { animation-delay: -2s; animation-duration: 5s; }
  @keyframes laserSweep {
    0%,100% { transform: rotate(-45deg); opacity: 0.3; }
    50% { transform: rotate(45deg); opacity: 1; }
  }

  .blinker {
    position: fixed;
    top: 50%;
    left: 20px;
    font-family: 'Press Start 2P', cursive;
    font-size: 1rem;
    color: #ff006e;
    text-shadow: 0 0 10px #ff006e, 0 0 20px #ff006e, 2px 2px 0 #000;
    animation: blinker 0.4s steps(2) infinite;
    z-index: 100;
    writing-mode: vertical-rl;
    letter-spacing: 4px;
  }
  @keyframes blinker {
    0%,49% { opacity: 1; }
    50%,100% { opacity: 0; }
  }

  .screaming {
    position: fixed;
    bottom: 30px;
    left: 30px;
    font-size: 5rem;
    animation: scream 0.2s ease-in-out infinite;
    z-index: 100;
    filter: drop-shadow(0 0 20px #ffff00);
  }
  @keyframes scream {
    0%,100% { transform: rotate(-10deg) scale(1); }
    50% { transform: rotate(10deg) scale(1.2); }
  }

  .ribbon-top {
    position: fixed;
    top: 70px;
    left: 0;
    right: 0;
    background: repeating-linear-gradient(90deg, #ff006e 0, #ff006e 30px, #ffff00 30px, #ffff00 60px);
    height: 15px;
    animation: ribbonSlide 2s linear infinite;
    z-index: 50;
  }
  @keyframes ribbonSlide {
    0% { background-position: 0 0; }
    100% { background-position: 60px 0; }
  }

  .stonks-badge {
    position: fixed;
    top: 90px;
    right: 20px;
    background: linear-gradient(135deg, #06ffa5, #3a86ff);
    color: #fff;
    padding: 1rem;
    border: 4px solid #fff;
    border-radius: 15px;
    font-family: 'Press Start 2P', cursive;
    font-size: 0.75rem;
    text-align: center;
    box-shadow: 0 0 30px #00ffff;
    animation: stonksBounce 1.5s ease-in-out infinite;
    z-index: 100;
    transform: rotate(15deg);
  }
  @keyframes stonksBounce {
    0%,100% { transform: rotate(15deg) scale(1); }
    50% { transform: rotate(-15deg) scale(1.1); }
  }

  .warning-tape {
    position: fixed;
    top: 90px;
    left: -50px;
    width: 300px;
    background: repeating-linear-gradient(45deg, #ffff00 0, #ffff00 20px, #000 20px, #000 40px);
    color: #fff;
    font-family: 'Press Start 2P', cursive;
    font-size: 0.9rem;
    padding: 0.6rem;
    text-align: center;
    transform: rotate(-20deg);
    text-shadow: 2px 2px 0 #000, -2px -2px 0 #ff006e;
    box-shadow: 0 0 20px #000;
    z-index: 100;
    letter-spacing: 2px;
  }
</style>
</head>
<body class="flashy">
<nav>
  <a href="index.html" class="brand">📚✨ Booklog 🌈</a>
  <div>
    <a href="index.html">🏠 Home</a>
    <a href="books.html">📖 Books</a>
    <a href="add.html" class="active">➕ Add</a>
    <a href="about.html">💁 About</a>
  </div>
</nav>
<div class="ribbon-top"></div>
<div class="laser"></div>
<div class="laser"></div>
<div class="laser"></div>
<div class="blinker">🚨 LIVE 🚨</div>
<div class="screaming">📣</div>
<div class="marquee-add"><span>💥💥💥 신규 등록!! 💥💥💥 🔥 지금 바로 책을 추가하세요!! 🔥 🎁 무료!! 🎁 무한!! 🎁 무적!! ⚡ 클릭만 하면 저장!! ⚡ 🌟 당신의 독서 인생이 바뀝니다!! 🌟 🚀🚀🚀 GO GO GO 🚀🚀🚀 💎 한정판 이벤트 💎 🎰 대박찬스 🎰</span></div>
<div class="warning-tape">⚠️ 책 추가 구역 ⚠️</div>
<div class="stonks-badge">📈<br>STONKS!!<br>독서력 UP</div>
<main>
  <h1 class="add-title add-title-shadow">💥 책 추가 💥</h1>
  <div class="add-wrap">
    <form id="form" onsubmit="return addBook(event)" oninput="updatePreview()">
      <div class="row">
        <label>📘 제목 <input name="title" required /></label>
        <label>✍️ 저자 <input name="author" required /></label>
      </div>
      <div class="row">
        <label>🏷️ 카테고리
          <select name="category">
            <option>소설</option><option>에세이</option><option>자기계발</option>
            <option>개발</option><option>교양</option><option>경제/경영</option>
            <option>기타</option>
          </select>
        </label>
        <label>⭐ 별점
          <select name="rating">
            <option>5</option><option>4</option><option selected>3</option>
            <option>2</option><option>1</option>
          </select>
        </label>
      </div>
      <div class="row">
        <label>📄 페이지 수 <input name="pages" type="number" min="1" placeholder="예: 320" /></label>
        <label>📅 읽은 날짜 <input name="date" type="date" /></label>
      </div>
      <label>🖼️ 표지 이미지 URL <input name="cover" type="url" placeholder="https://..." /></label>
      <label>🏷️ 태그 (쉼표 구분) <input name="tags" placeholder="예: 추천, 재독, 2026" /></label>
      <label>💬 한줄평 <textarea name="note" rows="3"></textarea></label>
      <div class="btn-row">
        <button class="btn" type="submit">🚀 저장하기 🚀</button>
        <button class="btn danger" type="reset" onclick="setTimeout(updatePreview,0)">💣 초기화 💣</button>
      </div>
    </form>

    <aside class="preview" id="preview">
      <span class="empty">✨ 입력하는 내용이 여기 미리보기로 표시돼요 ✨</span>
    </aside>
  </div>
</main>
<script src="app.js"></script>
<script>
  document.querySelector('input[name="date"]').value = new Date().toISOString().slice(0, 10);
  updatePreview();
  const items = ['🎉','🎊','✨','💖','⭐','💫','🌈','🎆','💎','🔥','🚀','🎁','💥','🏆','🎯','📚','💸','👑','🦄','⚡'];
  setInterval(() => {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.textContent = items[Math.floor(Math.random() * items.length)];
    c.style.left = Math.random() * 100 + 'vw';
    c.style.animationDuration = (2.5 + Math.random() * 3.5) + 's';
    c.style.fontSize = (1.8 + Math.random() * 2) + 'rem';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 8000);
  }, 120);
  setInterval(() => {
    document.body.style.filter = `hue-rotate(${Math.random() * 360}deg) saturate(${1 + Math.random()})`;
    setTimeout(() => { document.body.style.filter = ''; }, 80);
  }, 1500);
</script>
</body>
</html>
